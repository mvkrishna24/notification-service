# ── Shared defaults (all profiles inherit these) ──────────────────────────
spring:
  application:
    name: notification-service
  profiles:
    active: "${SPRING_PROFILES_ACTIVE:dev}"
  jpa:
    # Disable open-session-in-view: it keeps a DB connection open for the entire
    # HTTP request lifetime to support lazy-loading in views. We're a REST API,
    # not a template-rendered app — holding a connection this long wastes pool
    # capacity and masks N+1 bugs. Always fetch what you need up front.
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# ── Dev profile ───────────────────────────────────────────────────────────
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:notificationdb}
    username: ${POSTGRES_USER:notifuser}
    password: ${POSTGRES_PASSWORD:notifpass}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      pool-name: HikariPool-NotificationDev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          time-between-eviction-runs: 60s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        max.block.ms: 5000
        delivery.timeout.ms: 10000
        enable.idempotence: true
    consumer:
      group-id: notification-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.vamshi.notification.*"
        max.poll.records: 10
        session.timeout.ms: 30000
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

  mail:
    host: ${MAIL_HOST:smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    test-connection: false

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-256-bit-key}
    expiration-ms: 86400000

# ── Test profile ──────────────────────────────────────────────────────────
# H2 in-memory DB so `mvn test` runs without Docker.
# Kafka, Redis, and Mail auto-configuration are excluded in the test class
# itself (@SpringBootTest excludeAutoConfiguration). When Testcontainers
# integration tests are added (Phase 2+), they will use the real drivers.
---
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:notificationdb_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

app:
  jwt:
    secret: test-secret-key-not-used-in-production
    expiration-ms: 3600000

# ── Prod profile ──────────────────────────────────────────────────────────
# No defaults — every value must be set explicitly via environment variables.
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 20
      pool-name: HikariPool-NotificationProd

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: notification-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.vamshi.notification.*"
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

management:
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
